name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --config Debug

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: goldsrc-bin-${{ matrix.os }}
          path: addons/goldsrc/bin/

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S tests -B tests/build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build tests/build

      - name: Run tests
        run: ctest --test-dir tests/build --output-on-failure
